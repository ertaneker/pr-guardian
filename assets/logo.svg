<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2fff"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <rect width="1024" height="1024" rx="200" fill="url(#bg)"/>

  <!-- Shield shape -->
  <path d="M512 120 L800 280 L800 560 Q800 720 512 880 Q224 720 224 560 L224 280 Z"
        fill="none" stroke="url(#shield)" stroke-width="40" stroke-linejoin="round"/>

  <!-- Checkmark inside shield -->
  <path d="M400 520 L480 600 L640 400"
        fill="none" stroke="url(#shield)" stroke-width="48" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- PR code lines (left side decoration) -->
  <rect x="160" y="300" width="8" height="80" rx="4" fill="#00d4ff" opacity="0.5"/>
  <rect x="180" y="340" width="60" height="8" rx="4" fill="#00d4ff" opacity="0.3"/>
  <rect x="180" y="360" width="40" height="8" rx="4" fill="#00d4ff" opacity="0.2"/>

  <!-- PR code lines (right side decoration) -->
  <rect x="800" y="420" width="80" height="8" rx="4" fill="#7b2fff" opacity="0.3"/>
  <rect x="810" y="440" width="50" height="8" rx="4" fill="#7b2fff" opacity="0.45"/>

  <!-- AI sparkle dots -->
  <circle cx="280" cy="200" r="6" fill="#00d4ff" opacity="0.6"/>
  <circle cx="750" cy="180" r="5" fill="#7b2fff" opacity="0.5"/>
  <circle cx="200" cy="680" r="4" fill="#00d4ff" opacity="0.4"/>
  <circle cx="820" cy="700" r="5" fill="#7b2fff" opacity="0.5"/>
</svg>
